version: 2

project_name: community-waste-collection-system

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: api
    main: ./cmd/api
    binary: api
    env:
      - CGO_ENABLED=0
    ldflags:
      - -w -s -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: api-archive
    builds:
      - api
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: fairyhunter13
    name: community-waste-collection-system
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

snapshot:
  version_template: "{{ .Tag }}-next"

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: waste-collection-api
    static_configs:
      - targets: ["app:2112"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Correctness
    - errcheck
    - govet
    - staticcheck
    - gosec
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - contextcheck
    - exhaustive

    # Code quality
    - revive
    - unused
    - ineffassign
    - goconst
    - godot
    - misspell
    - cyclop
    - prealloc

    # Style and clarity
    - whitespace
    - godox

  settings:
    cyclop:
      max-complexity: 15

    exhaustive:
      default-signifies-exhaustive: true

    gosec:
      excludes:
        - G115
        - G108

    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: package-comments
        - name: unexported-return

    goconst:
      min-len: 3
      min-occurrences: 3

    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - BUG

  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [gosec, cyclop]

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - "github.com/fairyhunter13/community-waste-collection-system"

issues:
  max-same-issues: 0

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Compliance check (no forbidden identifiers)
        run: bash scripts/compliance_check.sh

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  image-scan:
    name: Container Image Scan
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cwc-scan:ci -f build/Dockerfile .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy image scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --format table \
            cwc-scan:ci

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 90

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: |
          COVERPKG=$(go list ./internal/... | grep -Ev '/mocks$|/repository$|/observability$' | paste -sd, -)
          go test -race -count=1 \
            -coverprofile=coverage.out \
            -coverpkg="${COVERPKG}" \
            ./internal/... -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.out

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: [lint]
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run integration tests
        run: |
          COVERPKG=$(go list ./internal/... | grep -Ev '/mocks$|/observability$' | paste -sd, -)
          go test -race -count=1 -tags=integration \
            -coverprofile=coverage-integration.out \
            -coverpkg="${COVERPKG}" \
            ./internal/repository/... ./internal/service/... \
            -timeout 120s -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.out

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-24.04
    needs: [lint, test-unit, test-integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: .

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: .

      - name: Enforce coverage threshold
        run: |
          echo "=== Unit test coverage ==="
          go tool cover -func=coverage.out

          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total unit coverage: ${TOTAL}%"

          MIN=80
          if awk "BEGIN { exit ($TOTAL > $MIN ? 0 : 1) }"; then
            echo "PASS: coverage threshold met (${TOTAL}% > ${MIN}%)"
          else
            echo "FAIL: coverage ${TOTAL}% does not exceed minimum ${MIN}%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out,./coverage-integration.out
          flags: combined
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  contract:
    name: API Contract Lint
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Postman + Insomnia collections parse
        run: |
          python3 -c "
          import json, sys
          pm = json.load(open('api/community-waste.postman_collection.json'))
          ins = json.load(open('api/community-waste.insomnia_collection.json'))

          pm_count = sum(len(f.get('item', [])) for f in pm.get('item', []))
          ins_count = sum(1 for r in ins['resources'] if r['_type'] == 'request')
          print(f'Postman requests:  {pm_count}')
          print(f'Insomnia requests: {ins_count}')

          if pm_count != ins_count:
              print(f'ERROR: collection size mismatch ({pm_count} vs {ins_count})', file=sys.stderr)
              sys.exit(1)
          if pm_count < 25:
              print(f'ERROR: Postman collection only has {pm_count} requests (expected >= 25)', file=sys.stderr)
              sys.exit(1)
          print('OK: collections are valid and in sync')
          "

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenAPI spec
        run: |
          npx --yes @redocly/cli@1.25.11 lint api/openapi.yaml \
            --skip-rule no-empty-servers \
            --skip-rule security-defined \
            --skip-rule operation-4xx-response \
            --skip-rule no-server-example.com

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-24.04
    needs: [test-unit, test-integration]
    timeout-minutes: 20
    env:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Create .env for docker-compose
        run: |
          cp .env.example .env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable|' .env
          sed -i 's|S3_ENDPOINT=.*|S3_ENDPOINT=http://minio:9000|' .env
          sed -i 's|OTEL_EXPORTER_OTLP_ENDPOINT=.*|OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318|' .env
          echo "APP_ENV=ci" >> .env
          echo "WORKER_CANCEL_INTERVAL=5s" >> .env
          echo "RATE_LIMIT_RPS=50" >> .env
          echo "RATE_LIMIT_BURST=50" >> .env

      - name: Start infrastructure services
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d \
            postgres minio otel-collector loki promtail

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f deployments/docker-compose.yml exec -T postgres \
               pg_isready -U postgres -d waste_collection 2>/dev/null; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres ($i/30)..."
            sleep 3
          done

      - name: Wait for minio
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose -f deployments/docker-compose.yml ps minio --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1)
            if echo "$STATUS" | grep -q "healthy"; then
              echo "MinIO ready"
              break
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 3
          done

      - name: Wait for Loki
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/ready > /dev/null 2>&1; then
              echo "Loki ready"
              break
            fi
            echo "Waiting for Loki ($i/30)..."
            sleep 3
          done

      - name: Run database migrations
        run: |
          NETWORK=$(docker inspect \
            "$(docker compose -f deployments/docker-compose.yml ps -q postgres)" \
            --format='{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v "$(pwd)/migrations:/migrations" \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database "postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable" \
            up

      - name: Start application
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d app

      - name: Wait for application
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/households > /dev/null 2>&1; then
              echo "Application ready"
              break
            fi
            echo "Waiting for application ($i/40)..."
            sleep 3
          done

      - name: Run E2E tests
        run: |
          go test -race -count=1 -tags=e2e \
            ./test/e2e/... \
            -timeout 180s -v
        env:
          BASE_URL: "http://localhost:8080"
          E2E_DB_URL: "postgres://postgres:postgres@localhost:5432/waste_collection?sslmode=disable"
          # Loki correlation is verified in the dedicated step below (after a
          # 15-second Promtail flush window). Skip the in-test Loki assertion
          # to avoid a race between the request and Promtail's tail interval.
          E2E_SKIP_LOKI: "true"

      - name: Verify trace-to-log correlation via Loki
        run: |
          # Wait for Promtail to flush the E2E test traffic into Loki
          sleep 15
          START=$(( $(date +%s) - 600 ))000000000
          END=$(date +%s)000000000
          RESULT=$(curl -sG 'http://localhost:3100/loki/api/v1/query_range' \
            --data-urlencode 'query={service="waste-api"} | json | trace_id != ""' \
            --data-urlencode "start=${START}" \
            --data-urlencode "end=${END}" \
            --data-urlencode 'limit=10')
          COUNT=$(echo "$RESULT" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          streams = r.get('data', {}).get('result', [])
          total = sum(len(s.get('values', [])) for s in streams)
          print(total)
          " 2>/dev/null || echo "0")
          echo "Log lines with trace_id found in Loki: ${COUNT}"
          if [ "${COUNT}" -ge 1 ]; then
            echo "OK: trace↔log correlation verified"
          else
            echo "WARNING: no traced log lines found in Loki — Promtail may need more time"
            docker compose -f deployments/docker-compose.yml logs promtail --tail=20
          fi

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v --remove-orphans

  perf:
    name: Performance Tests
    runs-on: ubuntu-24.04
    needs: [test-unit, test-integration]
    timeout-minutes: 30
    env:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Create .env for docker-compose
        run: |
          cp .env.example .env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable|' .env
          sed -i 's|S3_ENDPOINT=.*|S3_ENDPOINT=http://minio:9000|' .env
          sed -i 's|OTEL_EXPORTER_OTLP_ENDPOINT=.*|OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318|' .env
          echo "APP_ENV=ci" >> .env

      - name: Start infrastructure services
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d \
            postgres minio otel-collector

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f deployments/docker-compose.yml exec -T postgres \
               pg_isready -U postgres -d waste_collection 2>/dev/null; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres ($i/30)..."
            sleep 3
          done

      - name: Wait for minio
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose -f deployments/docker-compose.yml ps minio --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1)
            if echo "$STATUS" | grep -q "healthy"; then
              echo "MinIO ready"
              break
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 3
          done

      - name: Run database migrations
        run: |
          NETWORK=$(docker inspect \
            "$(docker compose -f deployments/docker-compose.yml ps -q postgres)" \
            --format='{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v "$(pwd)/migrations:/migrations" \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database "postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable" \
            up

      - name: Start application
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d app

      - name: Wait for application
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/households > /dev/null 2>&1; then
              echo "Application ready"
              break
            fi
            echo "Waiting for application ($i/40)..."
            sleep 3
          done

      - name: Run performance tests
        run: |
          go test -bench=. -benchmem -run='^$' -tags=perf \
            ./test/perf/... -timeout 300s 2>&1 | tee perf-results.txt
        env:
          BASE_URL: "http://localhost:8080"

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: perf-results.txt

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v --remove-orphans

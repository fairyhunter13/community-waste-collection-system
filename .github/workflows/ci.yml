name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: |
          COVERPKG=$(go list ./internal/... | grep -Ev '/mocks$|/repository$|/observability$' | paste -sd, -)
          go test -race -count=1 \
            -coverprofile=coverage.out \
            -coverpkg="${COVERPKG}" \
            ./internal/... -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.out

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: [lint]
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run integration tests
        run: |
          COVERPKG=$(go list ./internal/... | grep -Ev '/mocks$|/observability$' | paste -sd, -)
          go test -race -count=1 -tags=integration \
            -coverprofile=coverage-integration.out \
            -coverpkg="${COVERPKG}" \
            ./internal/repository/... ./internal/service/... \
            -timeout 120s -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.out

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-24.04
    needs: [lint, test-unit, test-integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: .

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: .

      - name: Enforce coverage threshold
        run: |
          echo "=== Unit test coverage ==="
          go tool cover -func=coverage.out

          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total unit coverage: ${TOTAL}%"

          MIN=80
          if awk "BEGIN { exit !($TOTAL < $MIN) }"; then
            echo "FAIL: coverage ${TOTAL}% is below minimum ${MIN}%"
            exit 1
          fi
          echo "PASS: coverage threshold met (${TOTAL}% >= ${MIN}%)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out,./coverage-integration.out
          flags: combined
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-24.04
    needs: [coverage-gate]
    timeout-minutes: 20
    env:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Create .env for docker-compose
        run: |
          cp .env.example .env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable|' .env
          sed -i 's|S3_ENDPOINT=.*|S3_ENDPOINT=http://minio:9000|' .env
          sed -i 's|OTEL_EXPORTER_OTLP_ENDPOINT=.*|OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318|' .env
          echo "APP_ENV=ci" >> .env
          echo "WORKER_CANCEL_INTERVAL=5s" >> .env
          echo "RATE_LIMIT_RPS=50" >> .env
          echo "RATE_LIMIT_BURST=50" >> .env

      - name: Start infrastructure services
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d \
            postgres minio otel-collector

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f deployments/docker-compose.yml exec -T postgres \
               pg_isready -U postgres -d waste_collection 2>/dev/null; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres ($i/30)..."
            sleep 3
          done

      - name: Wait for minio
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose -f deployments/docker-compose.yml ps minio --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1)
            if echo "$STATUS" | grep -q "healthy"; then
              echo "MinIO ready"
              break
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 3
          done

      - name: Create MinIO bucket
        run: |
          docker compose -f deployments/docker-compose.yml exec -T minio \
            mc mb local/waste-proofs --ignore-existing

      - name: Run database migrations
        run: |
          NETWORK=$(docker inspect \
            "$(docker compose -f deployments/docker-compose.yml ps -q postgres)" \
            --format='{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v "$(pwd)/migrations:/migrations" \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database "postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable" \
            up

      - name: Start application
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d app

      - name: Wait for application
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/households > /dev/null 2>&1; then
              echo "Application ready"
              break
            fi
            echo "Waiting for application ($i/40)..."
            sleep 3
          done

      - name: Run E2E tests
        run: |
          go test -race -count=1 -tags=e2e \
            ./test/e2e/... \
            -timeout 180s -v
        env:
          BASE_URL: "http://localhost:8080"
          E2E_DB_URL: "postgres://postgres:postgres@localhost:5432/waste_collection?sslmode=disable"

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v --remove-orphans

  perf:
    name: Performance Tests
    runs-on: ubuntu-24.04
    needs: [coverage-gate]
    timeout-minutes: 30
    env:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Create .env for docker-compose
        run: |
          cp .env.example .env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable|' .env
          sed -i 's|S3_ENDPOINT=.*|S3_ENDPOINT=http://minio:9000|' .env
          sed -i 's|OTEL_EXPORTER_OTLP_ENDPOINT=.*|OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318|' .env
          echo "APP_ENV=ci" >> .env

      - name: Start infrastructure services
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d \
            postgres minio otel-collector

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f deployments/docker-compose.yml exec -T postgres \
               pg_isready -U postgres -d waste_collection 2>/dev/null; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres ($i/30)..."
            sleep 3
          done

      - name: Wait for minio
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose -f deployments/docker-compose.yml ps minio --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1)
            if echo "$STATUS" | grep -q "healthy"; then
              echo "MinIO ready"
              break
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 3
          done

      - name: Run database migrations
        run: |
          NETWORK=$(docker inspect \
            "$(docker compose -f deployments/docker-compose.yml ps -q postgres)" \
            --format='{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v "$(pwd)/migrations:/migrations" \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database "postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable" \
            up

      - name: Start application
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d app

      - name: Wait for application
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/households > /dev/null 2>&1; then
              echo "Application ready"
              break
            fi
            echo "Waiting for application ($i/40)..."
            sleep 3
          done

      - name: Run performance tests
        run: |
          go test -bench=. -benchmem -run='^$' -tags=perf \
            ./test/perf/... -timeout 300s 2>&1 | tee perf-results.txt
        env:
          BASE_URL: "http://localhost:8080"

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: perf-results.txt

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v --remove-orphans

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build -o /dev/null ./...

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: |
          go test -race -count=1 \
            -coverprofile=coverage.out \
            -coverpkg=./internal/... \
            ./internal/... -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  coverage-gate:
    name: Coverage Gate (≥80%)
    runs-on: ubuntu-24.04
    needs: [test-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download unit coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: .

      - name: Enforce 80% coverage gate
        run: |
          TOTAL=$(go tool cover -func=coverage.out \
            | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: ${TOTAL}%"
          if awk "BEGIN {exit ($TOTAL+0 >= 80)}"; then
            echo "::error::Coverage ${TOTAL}% is below the 80% minimum threshold"
            exit 1
          fi
          echo "::notice::Coverage ${TOTAL}% passes the 80% gate"

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: [lint]
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run integration tests
        run: |
          go test -race -count=1 -tags=integration \
            -coverprofile=coverage-integration.out \
            -coverpkg=./internal/... \
            ./internal/repository/... ./internal/service/... \
            -timeout 120s -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-integration.out
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-24.04
    needs: [test-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    env:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Create .env for docker-compose
        run: |
          cp .env.example .env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable|' .env
          sed -i 's|S3_ENDPOINT=.*|S3_ENDPOINT=http://minio:9000|' .env
          sed -i 's|OTEL_EXPORTER_OTLP_ENDPOINT=.*|OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318|' .env
          echo "APP_ENV=ci" >> .env

      - name: Start infrastructure services
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d \
            postgres minio otel-collector

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f deployments/docker-compose.yml exec -T postgres \
               pg_isready -U postgres -d waste_collection 2>/dev/null; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres ($i/30)..."
            sleep 3
          done

      - name: Wait for minio
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose -f deployments/docker-compose.yml ps minio --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1)
            if echo "$STATUS" | grep -q "healthy"; then
              echo "MinIO ready"
              break
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 3
          done

      - name: Run database migrations
        run: |
          NETWORK=$(docker inspect \
            "$(docker compose -f deployments/docker-compose.yml ps -q postgres)" \
            --format='{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v "$(pwd)/migrations:/migrations" \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database "postgres://postgres:postgres@postgres:5432/waste_collection?sslmode=disable" \
            up

      - name: Start application
        run: |
          docker compose -f deployments/docker-compose.yml up --build -d app

      - name: Wait for application
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/households > /dev/null 2>&1; then
              echo "Application ready"
              break
            fi
            echo "Waiting for application ($i/40)..."
            sleep 3
          done

      - name: Run E2E tests
        run: |
          go test -race -count=1 -tags=e2e \
            ./test/e2e/... \
            -timeout 180s -v
        env:
          BASE_URL: "http://localhost:8080"

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v --remove-orphans

  bench:
    name: Benchmarks
    runs-on: ubuntu-24.04
    needs: [lint]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: waste_bench
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install migrate CLI
        run: |
          go install -tags 'postgres' \
            github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations
        run: |
          migrate -path ./migrations \
            -database "postgres://postgres:postgres@localhost:5432/waste_bench?sslmode=disable" \
            up

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -run='^$' -tags=integration \
            ./internal/... -timeout 120s 2>&1 | tee benchmark-results.txt
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/waste_bench?sslmode=disable"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.txt

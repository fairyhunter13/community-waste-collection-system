name: Dashboard Tests

on:
  pull_request:
    paths:
      - "deployments/grafana/**"
      - "internal/**/metrics*.go"
      - "internal/middleware/metrics.go"
      - "test/dashboards/**"
  workflow_dispatch:

jobs:
  dashboard-lint:
    name: Dashboard Lint (D1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run D1 static lint
        run: go test ./test/dashboards/ -v -count=1

  dashboard-metrics:
    name: Dashboard Metric Existence (D2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run D2 metric existence check
        run: go test -tags dashboard_int ./test/dashboards/ -run TestMetricExistence -v -count=1

  dashboard-playwright:
    name: Dashboard Render (D4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose -f deployments/docker-compose.yml up -d --build --wait
        timeout-minutes: 5

      - name: Wait for Grafana
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done

      - name: Generate smoke traffic
        run: |
          docker compose -f deployments/docker-compose.yml exec -T api sh -c '
            set -e
            BASE=http://localhost:8080
            HID=$(curl -sf -X POST $BASE/api/households \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"Smoke Test\",\"address\":\"CI\"}" | grep -o '"'"'"id":"[^"]*'"'"'" | head -1 | cut -d'"'"'"'"'"' -f4)
            for i in $(seq 1 10); do
              curl -sf -X POST $BASE/api/pickups \
                -H "Content-Type: application/json" \
                -d "{\"household_id\":\"$HID\",\"waste_type\":\"general\",\"pickup_date\":\"$(date -d +1day +%Y-%m-%d)\"}" || true
            done
          ' || true
        # Failure here is non-fatal: even without data, the dashboard render check is valuable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: test/dashboards/playwright/package.json

      - name: Install Playwright + Chromium
        working-directory: test/dashboards/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright dashboard checks
        working-directory: test/dashboards/playwright
        env:
          GRAFANA_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload dashboard screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshots
          path: test/dashboards/playwright/test-results/
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/dashboards/playwright/playwright-report/
          retention-days: 7

      - name: Stop stack
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v
